services:
  gophish:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gophish
    restart: unless-stopped
    env_file: .env
    ports:
      # Admin panel (HTTPS)
      - "3333:3333"
      # Phishing server (HTTP)
      - "8080:80"
    volumes:
      # Persist the database between restarts
      - gophish-data:/opt/gophish/data
      # Persist training uploads (presentations and thumbnails) between restarts
      - gophish-training:/opt/gophish/static/training_uploads
    environment:
      # Override admin panel to listen on 0.0.0.0:3333
      - ADMIN_LISTEN_URL=0.0.0.0:3333
      - ADMIN_USE_TLS=true
      # Override phishing server to listen on 0.0.0.0:80
      - PHISH_LISTEN_URL=0.0.0.0:80
      - PHISH_USE_TLS=false
      # Database path (inside the persistent volume)
      - DB_FILE_PATH=data/gophish.db
      # Keycloak OIDC integration (set these to enable SSO)
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=nivoxis
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-gophish}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - OIDC_REDIRECT_URL=${OIDC_REDIRECT_URL:-https://localhost:3333/auth/oidc/callback}
      # MFA TOTP encryption key (32 bytes, base64-encoded)
      - MFA_TOTP_ENCRYPTION_KEY=${MFA_TOTP_ENCRYPTION_KEY}
    depends_on:
      - keycloak
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:3333/login"]
      interval: 30s
      timeout: 10s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    # Use start-dev for local development; replace with 'start' + HTTPS in production
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HTTP_PORT=8080
      - KC_HOSTNAME_STRICT=false
    ports:
      # Keycloak admin UI accessible on the host at :8888
      - "8888:8080"
    depends_on:
      - keycloak-db
    volumes:
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 30s
      timeout: 10s
      retries: 5

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data

volumes:
  gophish-data:
  gophish-training:
  keycloak-data:
  keycloak-db-data:
