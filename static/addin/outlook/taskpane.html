<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivoxis Security Assistant</title>
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 13px; color: #333; background: #fafbfc; }
        .header { background: #1a73e8; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
        .header img { height: 24px; }
        .header h1 { font-size: 15px; font-weight: 600; }
        .content { padding: 16px; }

        /* Threat Banner */
        .threat-banner { padding: 12px 14px; border-radius: 8px; margin-bottom: 14px; display: none; }
        .threat-banner.safe { background: #e8f5e9; border-left: 4px solid #4caf50; }
        .threat-banner.suspicious { background: #fff3e0; border-left: 4px solid #ff9800; }
        .threat-banner.likely_phishing { background: #fce4ec; border-left: 4px solid #e53935; }
        .threat-banner.confirmed_phishing { background: #ffcdd2; border-left: 4px solid #b71c1c; }
        .threat-banner h3 { font-size: 14px; margin-bottom: 6px; }
        .threat-banner p { font-size: 12px; line-height: 1.5; }

        /* Score Circle */
        .score-section { text-align: center; margin: 16px 0; }
        .score-circle { width: 80px; height: 80px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; border: 4px solid; }
        .score-circle.safe { border-color: #4caf50; color: #4caf50; }
        .score-circle.suspicious { border-color: #ff9800; color: #ff9800; }
        .score-circle.phishing { border-color: #e53935; color: #e53935; }
        .score-label { margin-top: 6px; font-size: 12px; color: #666; }

        /* Indicators */
        .indicators { margin: 14px 0; }
        .indicator { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .indicator-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
        .indicator-text { font-size: 12px; line-height: 1.4; }

        /* Action Buttons */
        .actions { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
        .btn { padding: 10px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; text-align: center; }
        .btn-report { background: #e53935; color: white; }
        .btn-report:hover { background: #c62828; }
        .btn-safe { background: #4caf50; color: white; }
        .btn-safe:hover { background: #388e3c; }
        .btn-analyze { background: #1a73e8; color: white; }
        .btn-analyze:hover { background: #1565c0; }

        /* Learning Tip */
        .learning-tip { background: #e3f2fd; border-radius: 8px; padding: 12px; margin-top: 14px; font-size: 12px; line-height: 1.5; }
        .learning-tip strong { color: #1a73e8; }

        /* Status */
        .status { text-align: center; padding: 20px; color: #999; font-style: italic; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #ddd; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Simulation Badge */
        .sim-badge { background: #9c27b0; color: white; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ Nivoxis Security</h1>
    </div>

    <div class="content">
        <div id="loading" class="status">
            <div class="spinner"></div>
            <p style="margin-top:10px;">Analyzing email...</p>
        </div>

        <div id="results" style="display:none;">
            <!-- Threat Banner -->
            <div id="threatBanner" class="threat-banner">
                <h3 id="threatTitle"></h3>
                <p id="threatSummary"></p>
            </div>

            <!-- Simulation Badge -->
            <div id="simBadge" class="sim-badge" style="display:none;">📋 This was a phishing simulation</div>

            <!-- Threat Score -->
            <div class="score-section">
                <div id="scoreCircle" class="score-circle safe">
                    <span id="scoreValue">-</span>
                </div>
                <div class="score-label">Threat Score</div>
            </div>

            <!-- Indicators -->
            <div class="indicators" id="indicatorsList"></div>

            <!-- Learning Tip -->
            <div class="learning-tip" id="learningTip" style="display:none;">
                <strong>💡 Learning Tip</strong><br>
                <span id="learningTipText"></span>
            </div>

            <!-- Recommendation -->
            <div style="margin-top:14px;padding:10px;background:#f5f5f5;border-radius:6px;font-size:12px;" id="recommendation"></div>

            <!-- Action Buttons -->
            <div class="actions">
                <button class="btn btn-report" id="btnReport" onclick="reportEmail()">
                    🚨 Report as Phishing
                </button>
                <button class="btn btn-analyze" onclick="analyzeEmail()">
                    🔄 Re-Analyze
                </button>
            </div>
        </div>

        <div id="reported" class="status" style="display:none;">
            <p style="font-size:18px;">✅</p>
            <p style="margin-top:8px;font-weight:600;">Email Reported</p>
            <p style="margin-top:6px;">Thank you! Your security team has been notified.</p>
        </div>
    </div>

    <script>
    // Configuration — set during deployment
    var NIVOXIS_API_BASE = '{{NIVOXIS_API_BASE}}'; // e.g. https://phish.yourcompany.com/api
    var PLUGIN_API_KEY = '{{PLUGIN_API_KEY}}';

    Office.onReady(function(info) {
        if (info.host === Office.HostType.Outlook) {
            analyzeEmail();
        }
    });

    function analyzeEmail() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').style.display = 'none';

        var item = Office.context.mailbox.item;

        // Collect email metadata
        var request = {
            message_id: item.internetMessageId || '',
            subject: item.subject || '',
            sender_email: (item.from && item.from.emailAddress) || '',
            sender_name: (item.from && item.from.displayName) || '',
            provider: 'outlook'
        };

        // Get email body for deeper analysis
        item.body.getAsync(Office.CoercionType.Text, function(bodyResult) {
            if (bodyResult.status === Office.AsyncResultStatus.Succeeded) {
                request.body = bodyResult.value.substring(0, 5000); // First 5000 chars
            }

            // Get headers if available
            if (item.getAllInternetHeadersAsync) {
                item.getAllInternetHeadersAsync(function(headerResult) {
                    if (headerResult.status === Office.AsyncResultStatus.Succeeded) {
                        request.headers = headerResult.value.substring(0, 3000);
                    }
                    sendAnalysisRequest(request);
                });
            } else {
                sendAnalysisRequest(request);
            }
        });
    }

    function sendAnalysisRequest(request) {
        fetch(NIVOXIS_API_BASE + '/inbox/addin/analyze', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + PLUGIN_API_KEY
            },
            body: JSON.stringify(request)
        })
        .then(function(resp) { return resp.json(); })
        .then(function(data) { renderResults(data); })
        .catch(function(err) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('threatTitle').textContent = 'Analysis Unavailable';
            document.getElementById('threatSummary').textContent = 'Could not reach the Nivoxis server. Please check your connection.';
            document.getElementById('threatBanner').className = 'threat-banner suspicious';
            document.getElementById('threatBanner').style.display = 'block';
        });
    }

    function renderResults(data) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('results').style.display = 'block';

        // Threat banner
        var banner = document.getElementById('threatBanner');
        banner.className = 'threat-banner ' + data.threat_level;
        banner.style.display = 'block';

        var titles = {
            'safe': '✅ Email Appears Safe',
            'suspicious': '⚠️ Suspicious Email Detected',
            'likely_phishing': '🚨 Likely Phishing Email',
            'confirmed_phishing': '🚨 Confirmed Phishing!',
            'simulation': '📋 Phishing Simulation'
        };
        document.getElementById('threatTitle').textContent = titles[data.threat_level] || 'Analysis Complete';
        document.getElementById('threatSummary').textContent = data.summary || '';

        // Simulation badge
        if (data.was_simulation) {
            document.getElementById('simBadge').style.display = 'inline-block';
        }

        // Score circle
        var score = Math.round((data.confidence_score || 0) * 100);
        document.getElementById('scoreValue').textContent = score + '%';
        var circle = document.getElementById('scoreCircle');
        if (data.threat_level === 'safe') {
            circle.className = 'score-circle safe';
        } else if (data.threat_level === 'suspicious') {
            circle.className = 'score-circle suspicious';
        } else {
            circle.className = 'score-circle phishing';
        }

        // Indicators
        var list = document.getElementById('indicatorsList');
        list.innerHTML = '';
        if (data.indicators && data.indicators.length > 0) {
            data.indicators.forEach(function(ind) {
                var severity = ind.severity || 'info';
                var icons = { 'critical': '🔴', 'high': '🟠', 'medium': '🟡', 'low': '🟢', 'info': 'ℹ️' };
                var div = document.createElement('div');
                div.className = 'indicator';
                div.innerHTML = '<span class="indicator-icon">' + (icons[severity] || 'ℹ️') + '</span>' +
                    '<span class="indicator-text"><strong>' + (ind.name || ind.type || '') + '</strong><br>' +
                    (ind.description || '') + '</span>';
                list.appendChild(div);
            });
        }

        // Learning tip
        if (data.learning_tip) {
            document.getElementById('learningTip').style.display = 'block';
            document.getElementById('learningTipText').textContent = data.learning_tip;
        }

        // Recommendation
        document.getElementById('recommendation').textContent = data.recommendation || '';
    }

    function reportEmail() {
        var item = Office.context.mailbox.item;
        fetch(NIVOXIS_API_BASE + '/report?rid=' + encodeURIComponent(item.internetMessageId || ''), {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json',
                'Authorization': 'Bearer ' + PLUGIN_API_KEY
            },
            body: JSON.stringify({
                reporter_email: Office.context.mailbox.userProfile.emailAddress,
                subject: item.subject,
                sender_email: (item.from && item.from.emailAddress) || ''
            })
        })
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
            document.getElementById('results').style.display = 'none';
            document.getElementById('reported').style.display = 'block';
            if (data.summary) {
                document.getElementById('reported').innerHTML =
                    '<p style="font-size:18px;">✅</p>' +
                    '<p style="margin-top:8px;font-weight:600;">Email Reported</p>' +
                    '<p style="margin-top:6px;">' + data.summary + '</p>' +
                    (data.learning_tip ? '<div class="learning-tip" style="margin-top:12px;"><strong>💡 Learning Tip</strong><br>' + data.learning_tip + '</div>' : '');
            }
        })
        .catch(function() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('reported').style.display = 'block';
        });
    }
    </script>
</body>
</html>
