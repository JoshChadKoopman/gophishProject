{{define "body"}}
<div class="col-sm-9 col-sm-offset-3 col-md-10 col-md-offset-2 main">
    <div class="page-header">
        <h1>
            <i class="fa fa-shield"></i> Network Events
            <button class="btn btn-default pull-right" id="rulesBtn" style="margin-left:8px;">
                <i class="fa fa-cogs"></i> Automation Rules
            </button>
        </h1>
    </div>
    <div id="flashes" class="row"></div>

    <!-- Dashboard Summary Cards -->
    <div id="eventDashboard" class="row" style="margin-bottom:20px;">
        <div class="col-md-2">
            <div class="panel panel-default text-center">
                <div class="panel-body">
                    <h3 id="totalEvents" style="margin:5px 0;">—</h3>
                    <p style="color:#888;margin:0;font-size:12px;">Total</p>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="panel panel-warning text-center">
                <div class="panel-body">
                    <h3 id="openEvents" style="margin:5px 0;">—</h3>
                    <p style="color:#888;margin:0;font-size:12px;">Open</p>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="panel panel-danger text-center">
                <div class="panel-body">
                    <h3 id="criticalOpen" style="margin:5px 0;">—</h3>
                    <p style="color:#888;margin:0;font-size:12px;">Critical</p>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="panel panel-danger text-center" style="border-color:#f0ad4e;">
                <div class="panel-body">
                    <h3 id="highOpen" style="margin:5px 0;">—</h3>
                    <p style="color:#888;margin:0;font-size:12px;">High</p>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="panel panel-info text-center">
                <div class="panel-body">
                    <h3 id="avgResolution" style="margin:5px 0;">—</h3>
                    <p style="color:#888;margin:0;font-size:12px;">Avg Resolution (hrs)</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="row" style="margin-bottom:15px;">
        <div class="col-md-2">
            <select class="form-control" id="filterSource">
                <option value="">All Sources</option>
                <option value="siem">SIEM</option>
                <option value="endpoint">Endpoint</option>
                <option value="firewall">Firewall</option>
                <option value="email_gateway">Email Gateway</option>
                <option value="cloud">Cloud</option>
                <option value="identity">Identity</option>
                <option value="custom">Custom</option>
            </select>
        </div>
        <div class="col-md-2">
            <select class="form-control" id="filterSeverity">
                <option value="">All Severities</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
                <option value="info">Info</option>
            </select>
        </div>
        <div class="col-md-2">
            <select class="form-control" id="filterStatus">
                <option value="">All Statuses</option>
                <option value="new">New</option>
                <option value="acknowledged">Acknowledged</option>
                <option value="investigating">Investigating</option>
                <option value="resolved">Resolved</option>
                <option value="false_positive">False Positive</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary" onclick="loadEvents()"><i class="fa fa-filter"></i> Apply</button>
        </div>
    </div>

    <!-- Events Table -->
    <div class="row">
        <div class="col-md-12">
            <table id="eventsTable" class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Source</th>
                        <th>Type</th>
                        <th>Severity</th>
                        <th>Title</th>
                        <th>User</th>
                        <th>Status</th>
                        <th>Event Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="eventsBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Trend Chart Placeholder -->
    <div class="row" style="margin-top:20px;">
        <div class="col-md-12">
            <div class="panel panel-default">
                <div class="panel-heading"><h4 class="panel-title">30-Day Event Trend</h4></div>
                <div class="panel-body">
                    <canvas id="trendChart" height="80"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Breakdown Charts -->
    <div class="row">
        <div class="col-md-4">
            <div class="panel panel-default">
                <div class="panel-heading"><h4 class="panel-title">By Source</h4></div>
                <div class="panel-body" id="sourceBreakdown"></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="panel panel-default">
                <div class="panel-heading"><h4 class="panel-title">By Type</h4></div>
                <div class="panel-body" id="typeBreakdown"></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="panel panel-default">
                <div class="panel-heading"><h4 class="panel-title">By Severity</h4></div>
                <div class="panel-body" id="severityBreakdown"></div>
            </div>
        </div>
    </div>
</div>

<!-- Event Detail Modal -->
<div class="modal fade" id="eventDetailModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title"><i class="fa fa-shield"></i> Event Details</h4>
            </div>
            <div class="modal-body" id="eventDetailBody"></div>
            <div class="modal-footer">
                <select class="form-control" id="updateStatus" style="width:200px;display:inline-block;">
                    <option value="">Update Status...</option>
                    <option value="acknowledged">Acknowledged</option>
                    <option value="investigating">Investigating</option>
                    <option value="resolved">Resolved</option>
                    <option value="false_positive">False Positive</option>
                </select>
                <button class="btn btn-primary" id="updateStatusBtn">Update</button>
                <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script>
var currentEventId = 0;

function severityBadge(sev) {
    var colors = {"info":"info","low":"success","medium":"warning","high":"danger","critical":"danger"};
    return '<span class="label label-' + (colors[sev] || "default") + '">' + sev + '</span>';
}

function statusBadge(status) {
    var colors = {"new":"primary","acknowledged":"info","investigating":"warning","resolved":"success","false_positive":"default"};
    return '<span class="label label-' + (colors[status] || "default") + '">' + (status || "").replace(/_/g, " ") + '</span>';
}

function loadDashboard() {
    api.networkEvents.dashboard()
        .success(function(d) {
            $("#totalEvents").text(d.total_events);
            $("#openEvents").text(d.open_events);
            $("#criticalOpen").text(d.critical_open);
            $("#highOpen").text(d.high_open);
            $("#avgResolution").text(d.avg_resolution_hours ? d.avg_resolution_hours.toFixed(1) : "—");

            // Source breakdown
            var sourceHtml = "";
            $.each(d.events_by_source || [], function(i, s) {
                sourceHtml += '<div>' + s.source + ': <strong>' + s.count + '</strong></div>';
            });
            $("#sourceBreakdown").html(sourceHtml || "<em>No data</em>");

            // Type breakdown
            var typeHtml = "";
            $.each(d.events_by_type || [], function(i, t) {
                typeHtml += '<div>' + t.event_type.replace(/_/g, " ") + ': <strong>' + t.count + '</strong></div>';
            });
            $("#typeBreakdown").html(typeHtml || "<em>No data</em>");

            // Severity breakdown
            var sevHtml = "";
            $.each(d.events_by_severity || [], function(i, s) {
                sevHtml += '<div>' + severityBadge(s.severity) + ' <strong>' + s.count + '</strong></div>';
            });
            $("#severityBreakdown").html(sevHtml || "<em>No data</em>");

            // Trend chart
            if (d.trend_data && d.trend_data.length > 0 && typeof Chart !== "undefined") {
                var labels = d.trend_data.map(function(t) { return t.date; });
                var counts = d.trend_data.map(function(t) { return t.count; });
                var ctx = document.getElementById("trendChart").getContext("2d");
                new Chart(ctx, {
                    type: "line",
                    data: {
                        labels: labels,
                        datasets: [{
                            label: "Events",
                            data: counts,
                            borderColor: "#337ab7",
                            backgroundColor: "rgba(51,122,183,0.1)",
                            fill: true
                        }]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true } } }
                });
            }
        });
}

function loadEvents() {
    var params = {
        source: $("#filterSource").val(),
        severity: $("#filterSeverity").val(),
        status: $("#filterStatus").val(),
        limit: 100
    };
    var qs = $.param(params);
    api.networkEvents.list(qs)
        .success(function(data) {
            var html = "";
            $.each(data || [], function(i, e) {
                html += '<tr>' +
                    '<td>' + e.id + '</td>' +
                    '<td>' + e.source + '</td>' +
                    '<td>' + e.event_type.replace(/_/g, " ") + '</td>' +
                    '<td>' + severityBadge(e.severity) + '</td>' +
                    '<td>' + escapeHtml(e.title) + '</td>' +
                    '<td>' + (e.user_email || "—") + '</td>' +
                    '<td>' + statusBadge(e.status) + '</td>' +
                    '<td>' + moment(e.event_date).format("YYYY-MM-DD HH:mm") + '</td>' +
                    '<td><button class="btn btn-xs btn-info" onclick="viewEvent(' + e.id + ')"><i class="fa fa-eye"></i></button></td>' +
                    '</tr>';
            });
            $("#eventsBody").html(html || '<tr><td colspan="9" class="text-center">No events found</td></tr>');
        });
}

function viewEvent(id) {
    currentEventId = id;
    api.networkEvents.get(id)
        .success(function(e) {
            var html = '<div class="row">' +
                '<div class="col-md-6">' +
                '<p><strong>Source:</strong> ' + e.source + '</p>' +
                '<p><strong>Type:</strong> ' + e.event_type.replace(/_/g, " ") + '</p>' +
                '<p><strong>Severity:</strong> ' + severityBadge(e.severity) + '</p>' +
                '<p><strong>Status:</strong> ' + statusBadge(e.status) + '</p>' +
                '</div><div class="col-md-6">' +
                '<p><strong>Source IP:</strong> ' + (e.source_ip || "—") + '</p>' +
                '<p><strong>Destination IP:</strong> ' + (e.destination_ip || "—") + '</p>' +
                '<p><strong>User:</strong> ' + (e.user_email || "—") + '</p>' +
                '<p><strong>Device:</strong> ' + (e.device_id || "—") + '</p>' +
                '</div></div>';

            html += '<hr><h5>Description</h5><div class="well">' + escapeHtml(e.description || "No description") + '</div>';

            if (e.notes && e.notes.length > 0) {
                html += '<h5>Notes</h5>';
                $.each(e.notes, function(i, n) {
                    html += '<div class="panel panel-default"><div class="panel-body">' +
                        '<small class="text-muted">' + moment(n.created_date).format("YYYY-MM-DD HH:mm") + '</small><br>' +
                        escapeHtml(n.content) + '</div></div>';
                });
            }

            if (e.raw_payload) {
                html += '<h5>Raw Payload</h5><pre style="max-height:200px;overflow:auto;">' + escapeHtml(e.raw_payload) + '</pre>';
            }

            $("#eventDetailBody").html(html);
            $("#updateStatus").val("");
            $("#eventDetailModal").modal("show");
        });
}

$("#updateStatusBtn").click(function() {
    var status = $("#updateStatus").val();
    if (!status || !currentEventId) return;
    api.networkEvents.updateStatus(currentEventId, status)
        .success(function() {
            $("#eventDetailModal").modal("hide");
            loadEvents();
            loadDashboard();
        });
});

function escapeHtml(text) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(text || ""));
    return div.innerHTML;
}

$(document).ready(function() {
    loadDashboard();
    loadEvents();
});
</script>
{{end}}
