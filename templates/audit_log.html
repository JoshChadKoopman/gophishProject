{{define "body"}}
<div class="col-sm-9 col-sm-offset-3 col-md-10 col-md-offset-2 main">
    <h1 class="page-header">
        <i class="fa fa-shield"></i> Audit Log
    </h1>
    <div id="flashes" class="row"></div>

    <!-- Filter bar -->
    <div class="well well-sm" class="u-mb10">
        <div class="row">
            <div class="col-md-3">
                <label class="control-label" class="u-fs12">Action</label>
                <select class="form-control input-sm" id="filterAction">
                    <option value="">All Actions</option>
                    <option value="role_change">Role Change</option>
                    <option value="user_created">User Created</option>
                    <option value="user_deleted">User Deleted</option>
                    <option value="user_locked">User Locked</option>
                    <option value="user_unlocked">User Unlocked</option>
                    <option value="login_success">Login Success</option>
                    <option value="login_failed">Login Failed</option>
                    <option value="mfa_enrolled">MFA Enrolled</option>
                    <option value="mfa_verified">MFA Verified</option>
                    <option value="mfa_failed">MFA Failed</option>
                    <option value="mfa_lockout">MFA Lockout</option>
                    <option value="training_assigned">Training Assigned</option>
                    <option value="training_auto_assigned">Training Auto-Assigned</option>
                    <option value="training_completed">Training Completed</option>
                    <option value="certificate_issued">Certificate Issued</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="control-label" class="u-fs12">Actor</label>
                <input type="text" class="form-control input-sm" id="filterActor" placeholder="Search by username..." />
            </div>
            <div class="col-md-2">
                <label class="control-label" class="u-fs12">From</label>
                <input type="text" class="form-control input-sm" id="filterDateFrom" placeholder="YYYY-MM-DD" />
            </div>
            <div class="col-md-2">
                <label class="control-label" class="u-fs12">To</label>
                <input type="text" class="form-control input-sm" id="filterDateTo" placeholder="YYYY-MM-DD" />
            </div>
            <div class="col-md-2">
                <label class="control-label" class="u-fs12">&nbsp;</label>
                <button class="btn btn-primary btn-sm btn-block" id="applyFilters">
                    <i class="fa fa-filter"></i> Apply
                </button>
            </div>
        </div>
        <!-- Date range presets -->
        <div class="row" style="margin-top:8px;">
            <div class="col-md-12">
                <span style="font-size:12px; color:#888; margin-right:8px;">Quick range:</span>
                <button class="btn btn-xs btn-default date-preset" data-preset="today">Today</button>
                <button class="btn btn-xs btn-default date-preset" data-preset="7d">Last 7 days</button>
                <button class="btn btn-xs btn-default date-preset" data-preset="30d">Last 30 days</button>
                <button class="btn btn-xs btn-default date-preset" data-preset="month">This month</button>
                <button class="btn btn-xs btn-default date-preset" data-preset="clear" class="u-ml8">
                    <i class="fa fa-times"></i> Clear
                </button>
                <button class="btn btn-xs btn-default" id="exportCsv" style="float:right;">
                    <i class="fa fa-download"></i> Export CSV
                </button>
            </div>
        </div>
    </div>

    <div id="auditLoading" class="u-center-pad">
        <i class="fa fa-spinner fa-spin fa-4x"></i>
    </div>

    <div id="auditEmpty" style="display:none; text-align:center; padding:40px;">
        <i class="fa fa-shield fa-4x" style="color:#ccc; margin-bottom:15px;"></i>
        <h3>No audit log entries found</h3>
        <p>Audit events will appear here as they occur.</p>
    </div>

    <div id="auditContent" class="u-hidden">
        <table id="auditTable" class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Actor</th>
                    <th>Action</th>
                    <th>Target</th>
                    <th>Details</th>
                    <th>IP Address</th>
                </tr>
            </thead>
            <tbody id="auditTableBody"></tbody>
        </table>

        <!-- Pagination -->
        <div style="display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:10px;">
            <span id="paginationInfo" style="font-size:13px; color:#888;"></span>
            <div class="btn-group">
                <button class="btn btn-default btn-sm" id="prevPage" disabled>
                    <i class="fa fa-chevron-left"></i> Previous
                </button>
                <button class="btn btn-default btn-sm" id="nextPage">
                    Next <i class="fa fa-chevron-right"></i>
                </button>
            </div>
            <span style="font-size:13px; color:#888;">
                Page
                <input type="number" id="pageJump" min="1" style="width:55px; display:inline-block;"
                       class="form-control input-sm" />
                <span id="pageTotal"></span>
            </span>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/js/dist/app/audit_log.min.js"></script>
{{end}}
