{{ define "base" }}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nivoxis CyberAwareness Platform">
    <link rel="shortcut icon" href="/images/favicon.ico">
    <title>Nivoxis - {{ .Title }}</title>
    <link href="/css/dist/gophish.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,300,600,700' rel='stylesheet' type='text/css'>
</head>

<body>
    <div class="navbar navbar-inverse navbar-fixed-top" role="navigation">
        <div class="container-fluid">
            <div class="navbar-header">
                <img class="navbar-logo" src="/images/logo_inv_small.png" />
                <a class="navbar-brand" href="/">&nbsp;Nivoxis</a>
            </div>
        </div>
    </div>

    <div class="container">
        <form class="form-signin" action="/mfa/verify" method="POST">
            <img id="logo" src="/images/logo_purple.png" />
            <h2 class="form-signin-heading">{{ .Title }}</h2>
            <p class="text-muted text-center" style="margin-bottom:20px;">
                Enter the 6-digit code from your authenticator app,
                or enter one of your backup codes.
            </p>

            {{template "flashes" .Flashes}}

            <input type="hidden" name="csrf_token" value="{{.Token}}" />
            <input type="text"
                   name="code"
                   class="form-control"
                   placeholder="6-digit code or backup code"
                   maxlength="10"
                   inputmode="numeric"
                   autocomplete="one-time-code"
                   required
                   autofocus
                   style="text-align:center; letter-spacing:0.3em; font-size:1.4em; margin-bottom:10px;">

            <div class="checkbox" style="margin-bottom:15px;">
                <label>
                    <input type="checkbox" name="remember_device" value="1">
                    Remember this device for 30 days
                </label>
            </div>

            <button class="btn btn-lg btn-primary btn-block" type="submit">Verify</button>

            <div style="margin-top:15px; text-align:center;">
                <a href="/login">← Back to login</a>
            </div>
        </form>
    </div>

    <script src="/js/dist/vendor.min.js"></script>
</body>

</html>
{{ end }}
