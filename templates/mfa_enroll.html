{{ define "base" }}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nivoxis CyberAwareness Platform">
    <link rel="shortcut icon" href="/images/favicon.ico">
    <title>Nivoxis - {{ .Title }}</title>
    <link href="/css/dist/gophish.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,300,600,700' rel='stylesheet' type='text/css'>
</head>

<body>
    <div class="navbar navbar-inverse navbar-fixed-top" role="navigation">
        <div class="container-fluid">
            <div class="navbar-header">
                <img class="navbar-logo" src="/images/logo_inv_small.png" />
                <a class="navbar-brand" href="/">&nbsp;Nivoxis</a>
            </div>
        </div>
    </div>

    <div class="container">
        <form class="form-signin" action="/mfa/enroll" method="POST">
            <img id="logo" src="/images/logo_purple.png" />
            <h2 class="form-signin-heading">{{ .Title }}</h2>
            <p class="text-muted text-center" style="margin-bottom:20px;">
                Scan this QR code with Google Authenticator, Authy, or any TOTP app.
                Then enter the 6-digit code to confirm enrollment.
            </p>

            {{template "flashes" .Flashes}}

            {{if .QRCode}}
            <div style="text-align:center; margin-bottom:20px;">
                <img src="{{ .QRCode }}" alt="TOTP QR Code" style="max-width:200px; border:1px solid #ddd; padding:8px; border-radius:4px;" />
            </div>
            {{end}}

            <input type="hidden" name="csrf_token" value="{{.Token}}" />
            <input type="text"
                   name="code"
                   class="form-control"
                   placeholder="6-digit code from your app"
                   maxlength="6"
                   pattern="[0-9]{6}"
                   inputmode="numeric"
                   autocomplete="one-time-code"
                   required
                   autofocus
                   style="text-align:center; letter-spacing:0.3em; font-size:1.4em; margin-bottom:10px;">

            <button class="btn btn-lg btn-primary btn-block" type="submit">Confirm &amp; Enable 2FA</button>
        </form>
    </div>

    <script src="/js/dist/vendor.min.js"></script>
</body>

</html>
{{ end }}
