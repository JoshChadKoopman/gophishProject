{{ define "base" }}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nivoxis CyberAwareness Platform">
    <link rel="shortcut icon" href="/images/favicon.ico">
    <title>Nivoxis - {{ .Title }}</title>
    <link href="/css/dist/gophish.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,300,600,700' rel='stylesheet' type='text/css'>
</head>

<body>
<script>if(localStorage.getItem('nivoxis-dark')==='1'){document.body.classList.add('dark-mode');}</script>
    <div class="navbar navbar-inverse navbar-fixed-top" role="navigation">
        <div class="container-fluid">
            <div class="navbar-header">
                <img class="navbar-logo" src="/images/logo_inv_small.png" />
                <a class="navbar-brand" href="/">&nbsp;Nivoxis</a>
            </div>
        </div>
    </div>

    <div class="container">
        <form class="form-signin" action="/mfa/enroll" method="POST">
            <img id="logo" src="/images/logo_purple.png" />
            <h2 class="form-signin-heading">{{ .Title }}</h2>
            <p class="text-muted text-center" class="u-mb20">
                {{T .Locale "mfa.enroll.subtitle"}}
            </p>

            {{template "flashes" .Flashes}}

            {{if .QRCode}}
            <div style="text-align:center; margin-bottom:12px;">
                <img src="{{ .QRCode }}" alt="TOTP QR code — scan with your authenticator app"
                     style="max-width:200px; border:1px solid #ddd; padding:8px; border-radius:4px;" />
            </div>
            {{end}}

            {{if .ManualKey}}
            <div style="text-align:center; margin-bottom:16px;">
                <a href="#" id="manual-key-toggle" onclick="toggleManualKey(event)" style="font-size:0.85em; color:#888;">
                    Can't scan? Show manual key
                </a>
                <div id="manual-key-section" style="display:none; margin-top:10px;">
                    <p class="text-muted" style="font-size:0.82em; margin-bottom:6px;">
                        Enter this key manually into your authenticator app:
                    </p>
                    <div style="display:flex; align-items:center; justify-content:center; gap:8px;">
                        <code id="manual-key-value" style="font-size:1em; letter-spacing:0.15em; word-break:break-all;">{{.ManualKey}}</code>
                        <button type="button" class="btn btn-xs btn-default" onclick="copyManualKey()">
                            <i class="fa fa-copy"></i> Copy
                        </button>
                    </div>
                </div>
            </div>
            {{end}}

            <input type="hidden" name="csrf_token" value="{{.Token}}" />
            <input type="text"
                   name="code"
                   class="form-control"
                   placeholder="{{T .Locale "mfa.enroll.code_placeholder"}}"
                   maxlength="6"
                   pattern="[0-9]{6}"
                   inputmode="numeric"
                   autocomplete="one-time-code"
                   required
                   autofocus
                   style="text-align:center; letter-spacing:0.3em; font-size:1.4em; margin-bottom:10px;">

            <button class="btn btn-lg btn-primary btn-block" type="submit">{{T .Locale "mfa.enroll.submit"}}</button>
        </form>
    </div>

    <script src="/js/dist/vendor.min.js"></script>
    <script>
    function toggleManualKey(e) {
        e.preventDefault();
        var section = document.getElementById('manual-key-section');
        var link = document.getElementById('manual-key-toggle');
        var hidden = section.style.display === 'none';
        section.style.display = hidden ? '' : 'none';
        link.textContent = hidden ? 'Hide manual key' : "Can't scan? Show manual key";
    }

    function copyManualKey() {
        var key = document.getElementById('manual-key-value').textContent.trim();
        if (navigator.clipboard) {
            navigator.clipboard.writeText(key).then(function() {
                var btn = event.target.closest('button');
                var orig = btn.innerHTML;
                btn.innerHTML = '<i class="fa fa-check"></i> Copied';
                setTimeout(function() { btn.innerHTML = orig; }, 2000);
            });
        }
    }
    </script>
</body>

</html>
{{ end }}
